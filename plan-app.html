<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="江涛计划">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<title>江涛 · 2026下半年计划</title>
<style>
:root {
  /* 基础色 */
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --border: #e5e5ea;
  --border-light: #f0f0f2;

  /* 阴影 */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);

  /* 强调色 */
  --accent: #007aff;
  --accent-green: #34c759;
  --accent-orange: #ff9500;
  --accent-yellow: #ff9f0a;
  --accent-pink: #ff375f;
  --accent-purple: #af52de;

  /* 轨道色（保留色彩语义，调亮适配新背景） */
  --en: #34c759;
  --sw: #ff9500;
  --rs: #ff9f0a;
  --done: #f2f2f7;
  --danger: #ff3b30;

  /* 圆角 */
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-full: 9999px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 80px;
  line-height: 1.5;
}

/* Header */
.header {
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(245,245,247,0.85);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--border-light);
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
}
.header h1 {
  font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
  color: var(--text);
}
.header .date-range {
  font-size: 12px; color: var(--text-secondary); margin-top: 2px;
}

/* Progress mini */
.progress-mini {
  display: flex; gap: 8px; margin-top: 10px; align-items: center;
}
.progress-mini .bar-wrap {
  flex: 1; height: 5px; background: #e5e5ea; border-radius: 3px; overflow: hidden;
}
.progress-mini .bar-fill {
  height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s ease;
}
.progress-mini .pct { font-size: 11px; color: var(--text-secondary); min-width: 32px; text-align: right; font-weight: 600; }

/* Week Tabs */
.week-tabs {
  display: flex; gap: 6px; padding: 0 20px 8px;
  overflow-x: auto; scrollbar-width: none;
}
.week-tabs::-webkit-scrollbar { display: none; }
.week-tab {
  padding: 8px 14px; border-radius: var(--radius-full);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text-secondary); font-size: 13px; white-space: nowrap;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.week-tab.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(0,122,255,0.3);
}

/* Month label */
.month-label {
  padding: 16px 20px 6px; font-size: 13px; font-weight: 700;
  color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
}

/* Day card */
.day-card {
  margin: 8px 16px; padding: 20px;
  border-radius: var(--radius-md); background: var(--card);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.day-card:active { box-shadow: var(--shadow-md); }
.day-card.today {
  border-color: var(--accent);
  box-shadow: var(--shadow-md), 0 0 0 1px var(--accent);
}
.day-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.day-name { font-weight: 600; font-size: 15px; color: var(--text); }
.day-date { font-size: 12px; color: var(--text-secondary); }
.day-score {
  font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: var(--radius-full);
  background: var(--done); color: var(--text-secondary);
}
.day-score.good { background: #e8f8ed; color: var(--accent-green); }
.day-score.ok { background: #fff3e0; color: var(--accent-orange); }

/* Track label */
.track-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  margin-top: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  text-transform: uppercase;
}
.track-label .dot { width: 8px; height: 8px; border-radius: 50%; }
.track-en .dot { background: var(--en); }
.track-sw .dot { background: var(--sw); }
.track-rs .dot { background: var(--rs); }
.track-en { color: var(--en); }
.track-sw { color: var(--sw); }
.track-rs { color: var(--rs); }

/* Task item */
.task {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background 0.15s;
}
.task:last-child { border-bottom: none; }
.task .check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid #d1d1d6; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all 0.25s cubic-bezier(0.25,0.8,0.25,1.2);
}
.task.done .check {
  background: var(--accent-green); border-color: var(--accent-green);
  transform: scale(0.9);
}
.task.done .check::after { content: '✓'; font-size: 12px; color: #fff; font-weight: 700; }
.task .text { flex: 1; font-size: 14px; line-height: 1.5; color: var(--text); }
.task.done .text { color: var(--text-tertiary); text-decoration: line-through; }
.task .time-badge {
  font-size: 11px; color: var(--text-secondary); flex-shrink: 0;
  padding: 2px 8px; border-radius: var(--radius-full); background: #f2f2f7;
}

/* Filter row */
.filter-row {
  display: flex; gap: 8px; padding: 0 16px 10px; flex-wrap: wrap;
}
.filter-chip {
  padding: 7px 14px; border-radius: var(--radius-full); border: 1px solid var(--border);
  font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
  background: var(--card); font-weight: 500;
}
.filter-chip.on { background: var(--text); border-color: var(--text); color: #fff; }

/* Bottom nav */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: rgba(255,255,255,0.9);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--border-light); z-index: 20;
}
.nav-btn {
  flex: 1; padding: 10px 4px 14px; text-align: center;
  font-size: 10px; color: var(--text-secondary); cursor: pointer;
  transition: color 0.2s; font-weight: 500;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .icon { font-size: 22px; display: block; margin-bottom: 3px; }

/* Stats tab */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  padding: 16px;
}
.stat-card {
  background: var(--card); box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md); padding: 20px; text-align: center;
}
.stat-card .num { font-size: 36px; font-weight: 800; letter-spacing: -2px; color: var(--text); }
.stat-card .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

.streak-section {
  margin: 0 16px 16px; padding: 20px;
  background: var(--card); border: 1px solid var(--border-light);
  border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
}
.streak-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.streak-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.streak-dot {
  width: 30px; height: 30px; border-radius: 8px;
  background: #f2f2f7; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
}
.streak-dot.done { background: var(--accent-green); color: #fff; }
.streak-dot.miss { background: var(--accent-orange); color: #fff; }

/* Motivation */
.motivation {
  margin: 16px; padding: 20px;
  background: linear-gradient(135deg, #f0f0ff, #f5f0ff);
  border-radius: var(--radius-md); text-align: center;
  border: 1px solid #e8e8ff; box-shadow: var(--shadow-sm);
}
.motivation .quote { font-size: 14px; font-style: italic; color: var(--accent-purple); }
.motivation .author { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
/* ===== 桌面端布局 (≥768px) ===== */
@media (min-width: 768px) {
  body { padding-bottom: 0; }

  .app-layout {
    display: flex; min-height: calc(100vh - 100px);
    max-width: 1400px; margin: 0 auto; padding: 0 16px;
  }

  .sidebar {
    width: 240px; flex-shrink: 0;
    position: sticky; top: 100px; align-self: flex-start;
    height: calc(100vh - 116px);
    overflow-y: auto; overflow-x: hidden;
    padding-right: 8px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .sidebar-nav {
    display: flex; flex-direction: column; gap: 2px;
    background: var(--card); border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
    padding: 6px; overflow: hidden;
  }
  .sidebar-nav .nav-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; text-align: left; font-size: 14px;
    border-radius: var(--radius-sm); font-weight: 500;
    flex: none;
  }
  .sidebar-nav .nav-btn .icon { font-size: 20px; display: inline; margin: 0; }
  .sidebar-nav .nav-btn:hover { background: #f2f2f7; }
  .sidebar-nav .nav-btn.active { background: #e8f0fe; color: var(--accent); }

  .sidebar-weeks {
    background: var(--card); border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
    padding: 8px; overflow: hidden;
  }
  .sidebar-weeks .week-tab {
    display: block; width: 100%; margin-bottom: 2px;
    text-align: left; font-size: 13px; padding: 10px 12px;
    border: none; box-shadow: none;
  }
  .sidebar-weeks .week-tab:hover { background: #f2f2f7; }
  .sidebar-weeks .week-tab.active { background: var(--accent); }

  .sidebar-filters {
    background: var(--card); border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
    padding: 8px; display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar-filters .filter-chip {
    display: block; width: 100%; text-align: left;
    font-size: 13px; padding: 10px 12px; border: none;
    border-radius: var(--radius-sm);
  }

  .main-area {
    flex: 1; min-width: 0; padding-left: 24px;
    overflow-y: auto; height: calc(100vh - 116px);
    position: sticky; top: 100px;
  }

  .main-area .header { display: none; }

  /* 桌面端隐藏移动端元素 */
  .week-tabs { display: none; }
  .filter-row { display: none; }
  .nav { display: none; }

  /* 桌面端 day-card 全宽 */
  .day-card { margin: 0 0 12px 0; padding: 24px; border-radius: var(--radius-lg); }
  .day-card:hover { box-shadow: var(--shadow-md); }

  .stats-grid { padding: 0; gap: 12px; }
  .streak-section { margin: 0 0 12px 0; }
  .motivation { margin: 0 0 12px 0; }
  .month-label { padding: 16px 0 6px; }
}

/* ===== 移动端隐藏桌面元素 ===== */
@media (max-width: 767px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🎯 江涛·下半年冲刺</h1>
      <div class="date-range">研一暑假 → 研二上学期 · 2026.07-12</div>

  </div>
  <div class="progress-mini">
    <span style="font-size:10px;color:var(--text-secondary)">本周</span>

    <span class="pct" id="weekPct">0%</span>

  <div class="progress-mini" style="margin-top:4px">

</div>

<div class="app-layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-nav" id="sidebarNav">
      <div class="nav-btn active" data-tab="plan" onclick="switchTab('plan')">
        <span class="icon">📋</span><span>每日任务</span>
      </div>
      <div class="nav-btn" data-tab="memo" onclick="switchTab('memo')">

      </div>
      <div class="nav-btn" data-tab="stats" onclick="switchTab('stats')">
        <span class="icon">📊</span><span>统计数据</span>
      </div>
      <div class="nav-btn" data-tab="review" onclick="switchTab('review')">
        <span class="icon">🧠</span><span>防摆烂</span>

      <span class="filter-chip on" data-track="all" onclick="toggleFilter('all',this)">全部</span>

      <span class="filter-chip on" data-track="body" onclick="toggleFilter('body',this)">🏃 身体</span>
    </div>
    <div id="mainContent"></div>
  </div>
</div>

<!-- Bottom nav -->
<div class="nav">
  <div class="nav-btn active" data-tab="plan" onclick="switchTab('plan')">

</div>

// Generate bi-weekly plan from July to December 2026
const planData = {};

// Helper to add tasks to a day
function d(y,m,d,tasks){ const k=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; planData[k]=tasks; }

// === JULY ===

d(2026,7,1,[...w1,{track:'rs',text:'开始读第一篇论文（导师近期发表的优先）',time:'40min',id:'j1g'}]);

const w1d2 = [

  {track:'body',text:'第一次跑步：2公里，慢跑不追速度',time:'20min',id:'j2e'},
];
d(2026,7,2,w1d2);

const w1d3 = [
  {track:'en',text:'背30个六级核心词',time:'20min',id:'j3a'},
  {track:'en',text:'听15分钟英文播客',time:'15min',id:'j3b'},

  {track:'rs',text:'开始读第2篇论文（选实验室师兄发表的）',time:'30min',id:'j3e'},
];
d(2026,7,3,w1d3);

const w1d4 = [
  {track:'en',text:'背30个六级核心词（复习前3天的词）',time:'25min',id:'j4a'},

  {track:'body',text:'第二次跑步：2公里，找到舒服的配速',time:'20min',id:'j4e'},
];
d(2026,7,4,w1d4);

// Sunday - relax + plan
const w1d5 = [
  {track:'en',text:'复习本周140个单词，标记记不住的加重点',time:'30min',id:'j5a'},
  {track:'rs',text:'完成第2篇论文笔记',time:'30min',id:'j5b'},

];
d(2026,7,5,w1d5);

// Week 2 (Jul 6-12)
d(2026,7,6,[

]);
d(2026,7,9,[

// ============ HELPERS ============
function getDateStr(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getDayOfWeek(y,m,d){ const dt=new Date(y,m-1,d); return ['日','一','二','三','四','五','六'][dt.getDay()]; }
function isToday(y,m,d){
  const now=new Date(); return now.getFullYear()===y && (now.getMonth()+1)===m && now.getDate()===d;
}
const now = new Date();
const todayStr = getDateStr(now.getFullYear(), now.getMonth()+1, now.getDate());

// Generate week ranges
function getWeekRanges(){
  const weeks = [];
  let currentWeek = [];
  for(let m=7;m<=12;m++){
    const maxDay = m===9||m===11?30:31;
    for(let d=1;d<=maxDay;d++){
      const dow = getDayOfWeek(2026,m,d);
      currentWeek.push({y:2026,m,d,dow});
      if(dow==='日' || d===maxDay){
        weeks.push([...currentWeek]);
        currentWeek = [];
      }
    }
  }
  if(currentWeek.length) weeks.push(currentWeek);
  return weeks;
}

const weeks = getWeekRanges();

function renderWeekTabs(){
  const container = document.getElementById('weekTabs');
  container.innerHTML = weeks.map((w,i) => {
    const start = w[0]; const end = w[w.length-1];
    const label = `${start.m}/${start.d}-${end.m}/${end.d}`;
    const isActive = i===state.currentWeek;
    const isCurWeek = w.some(day=>isToday(day.y,day.m,day.d));
    return `<div class="week-tab ${isActive?'active':''} ${isCurWeek&&!isActive?'':''}"
      onclick="goToWeek(${i})" style="${isCurWeek&&!isActive?'border-color:var(--accent-purple);color:var(--accent-purple);':''}">
      ${label}${isCurWeek?' 📍':''}</div>`;
  }).join('');
}

function shouldShow(track){
  if(state.filters.includes('all')) return true;
  return state.filters.includes(track);
}

function renderPlan(){
  const container = document.getElementById('mainContent');
  const week = weeks[state.currentWeek];
  if(!week) { container.innerHTML='<div style="padding:20px">暂无数据</div>'; return; }

  let html = '';
  let curMonth = 0;

  week.forEach(day => {
    if(day.m !== curMonth){
      curMonth = day.m;
      const monthNames = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      html += `<div class="month-label">📅 ${monthNames[day.m]}</div>`;
    }

    const key = getDateStr(day.y, day.m, day.d);
    const tasks = planData[key] || [];
    const todayFlag = isToday(day.y, day.m, day.d);

    // Count done tasks
    const doneCount = tasks.filter(t => state.checks[t.id]).length;
    const totalCount = tasks.length;
    const scoreClass = totalCount===0?'':(doneCount===totalCount?'good':(doneCount>=totalCount/2?'ok':''));

    html += `<div class="day-card ${todayFlag?'today':''}">`;
    html += `<div class="day-header">
      <div>
        <span class="day-name">${day.m}月${day.d}日 周${day.dow}</span>
        ${todayFlag?' <span style="font-size:11px;color:var(--accent-purple);font-weight:700;">今天</span>':''}
      </div>
      <span class="day-score ${scoreClass}">${totalCount>0?doneCount+'/'+totalCount:'休'}</span>
    </div>`;

    // Group by track
    const tracks = {en:[],sw:[],rs:[],body:[],other:[]};
    tasks.forEach(t => {
      if(tracks[t.track]) tracks[t.track].push(t);
      else tracks.other.push(t);
    });

    const trackNames = {en:['🇬🇧 英语','en','track-en'],sw:['💻 软件','sw','track-sw'],rs:['🔬 课题','rs','track-rs'],body:['🏃 身体','body','track-en'],other:['📌 其他','other','track-en']};

    Object.entries(tracks).forEach(([track,ts]) => {
      if(ts.length===0) return;
      if(!shouldShow(track) && track!=='other') return;
      const [label, tk, cls] = trackNames[track];
      html += `<div class="track-label ${cls}"><span class="dot"></span>${label}</div>`;
      ts.forEach(t => {
        const done = !!state.checks[t.id];
        html += `<div class="task ${done?'done':''}" onclick="toggleTask('${t.id}')">
          <div class="check"></div>
          <div class="text">${t.text}</div>
          ${t.time&&t.time!=='—'?`<div class="time-badge">${t.time}</div>`:''}
        </div>`;
      });
    });

    if(tasks.length===0){
      html += `<div style="font-size:12px;color:var(--text-secondary);padding:4px 0">这天暂无安排（休息或补进度）</div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
  updateProgress();
}

function renderStats(){
  const container = document.getElementById('mainContent');

  // Count all tasks
  let totalTasks = 0, doneTasks = 0;
  let tasksByMonth = {};
  let trackCounts = {en:0,sw:0,rs:0,body:0};
  let trackDones = {en:0,sw:0,rs:0,body:0};

  Object.entries(planData).forEach(([key, tasks]) => {
    const m = parseInt(key.split('-')[1]);
    if(!tasksByMonth[m]) tasksByMonth[m] = {total:0,done:0};
    tasks.forEach(t => {
      totalTasks++;
      tasksByMonth[m].total++;
      if(trackCounts[t.track]) trackCounts[t.track]++;
      if(state.checks[t.id]) {
        doneTasks++;
        tasksByMonth[m].done++;
        if(trackDones[t.track]) trackDones[t.track]++;
      }
    });
  });

  const pct = totalTasks>0?Math.round(doneTasks/totalTasks*100):0;

  // Streak of days with at least 1 task done
  let streak = 0; let bestStreak = 0;
  const todayD = new Date();
  for(let i=0;i<180;i++){
    const d = new Date(todayD);
    d.setDate(d.getDate()-i);
    const k = getDateStr(d.getFullYear(), d.getMonth()+1, d.getDate());
    const tasks = planData[k];
    if(!tasks || tasks.length===0) continue;
    const done = tasks.filter(t=>state.checks[t.id]).length;
    if(done>0 && done===tasks.length) streak++;
    else if(done>0 && i===0) streak=1;
    else break;
  }
  // calc best streak
  let bs=0;
  for(let i=179;i>=0;i--){
    const d = new Date(2026,6,1);
    d.setDate(d.getDate()+i);
    if(d>todayD) continue;
    const k = getDateStr(d.getFullYear(), d.getMonth()+1, d.getDate());
    const tasks = planData[k];
    if(!tasks || tasks.length===0){ bs=0; continue; }
    const done = tasks.filter(t=>state.checks[t.id]).length;
    if(done===tasks.length && tasks.length>0) bs++;
    else { if(bs>bestStreak) bestStreak=bs; bs=0; }
  }
  bestStreak = Math.max(bestStreak, streak);

  // 30-day dots
  let dotsHtml = '';
  for(let i=29;i>=0;i--){
    const d = new Date(todayD);
    d.setDate(d.getDate()-i);
    const k = getDateStr(d.getFullYear(), d.getMonth()+1, d.getDate());
    const tasks = planData[k];
    if(!tasks || tasks.length===0){ dotsHtml+='<div class="streak-dot"></div>'; continue; }
    const done = tasks.filter(t=>state.checks[t.id]).length;
    const allDone = done===tasks.length;
    const someDone = done>0 && !allDone;
    dotsHtml += `<div class="streak-dot ${allDone?'done':(someDone?'miss':'')}"
      title="${k}: ${done}/${tasks.length}">${tasks.length>0?(allDone?'✓':(someDone?'◐':'')):''}</div>`;
  }

  const monthNames = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let monthHtml = '';
  for(let m=7;m<=12;m++){
    const data = tasksByMonth[m] || {total:0,done:0};
    const mpct = data.total>0?Math.round(data.done/data.total*100):0;
    monthHtml += `
      <div class="stat-card">
        <div class="num" style="font-size:24px">${mpct}%</div>
        <div class="label">${monthNames[m]} (${data.done}/${data.total})</div>
      </div>`;
  }

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" style="color:var(--accent-green)">${pct}%</div>
        <div class="label">总完成率 (${doneTasks}/${totalTasks})</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--accent-purple)">${streak}</div>
        <div class="label">当前连续全勤天数</div>
      </div>
    </div>

    <div class="streak-section">
      <h3>📅 近30日打卡</h3>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin-bottom:6px">
        <span>30天前</span><span>今天</span></div>
      <div class="streak-dots">${dotsHtml}</div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--text-secondary)">
        <span>🟢 全勤</span><span>🟠 部分</span><span>⬜ 无数据</span>
      </div>
    </div>

    <div class="stats-grid">
      ${monthHtml}
    </div>

    <div class="stats-grid" style="margin-top:0">
      ${['en','sw','rs','body'].map(tk=>{
        const names={en:'🇬🇧 英语',sw:'💻 软件',rs:'🔬 课题',body:'🏃 身体'};
        const p = trackCounts[tk]>0?Math.round(trackDones[tk]/trackCounts[tk]*100):0;
        return `<div class="stat-card">
          <div class="num" style="font-size:24px">${p}%</div>
          <div class="label">${names[tk]} (${trackDones[tk]}/${trackCounts[tk]})</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

          ✅ 汽车安全是法规刚需赛道（不会消失）
        </p>
      </div>
    </div>
  `;
}

function updateProgress(){
  // Current week progress
  const week = weeks[state.currentWeek];
  if(!week) return;
  let weekTotal=0, weekDone=0;
  week.forEach(day=>{
    const k = getDateStr(day.y, day.m, day.d);
    const tasks = planData[k]||[];
    tasks.forEach(t=>{ weekTotal++; if(state.checks[t.id]) weekDone++; });
  });
  const weekPct = weekTotal>0?Math.round(weekDone/weekTotal*100):0;
  document.getElementById('weekBar').style.width = weekPct+'%';
  document.getElementById('weekPct').textContent = weekPct+'%';

  // Total progress
  let allTotal=0, allDone=0;
  Object.values(planData).forEach(tasks=>{
    tasks.forEach(t=>{ allTotal++; if(state.checks[t.id]) allDone++; });
  });
  const totalPct = allTotal>0?Math.round(allDone/allTotal*100):0;
  document.getElementById('totalBar').style.width = totalPct+'%';
  document.getElementById('totalPct').textContent = totalPct+'%';

  // Mood icon
  const icon = document.getElementById('moodIcon');
  if(totalPct>=80) icon.textContent='🚀';
  else if(totalPct>=50) icon.textContent='💪';
  else if(totalPct>=20) icon.textContent='🔥';
  else icon.textContent='🐣';
}

function toggleTask(id){
  state.checks[id] = !state.checks[id];
  save();
  if(state.currentTab==='plan') renderPlan();
  else if(state.currentTab==='stats') renderStats();
  updateProgress();
}

function goToWeek(i){ state.currentWeek=i; save(); renderWeekTabs(); if(state.currentTab==='plan') renderPlan(); }

function switchTab(tab){
  state.currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='plan') renderPlan();
  else if(tab==='stats') renderStats();
  else if(tab==='review') renderReview();
  save();
}

function toggleFilter(track, el){
  if(track==='all'){
    if(state.filters.includes('all')){
      state.filters = [];
    } else {
      state.filters = ['all'];
    }
  } else {
    if(state.filters.includes('all')){
      state.filters = state.filters.filter(f=>f!=='all');
      state.filters.push(track);
    } else if(state.filters.includes(track)){
      state.filters = state.filters.filter(f=>f!==track);
      // Don't let all be empty
      if(state.filters.length===0) state.filters=['all'];
    } else {
      state.filters.push(track);
    }
  }

  // Update chip visuals
  document.querySelectorAll('.filter-chip').forEach(chip => {
    const dt = chip.dataset.track;
    chip.classList.toggle('on', state.filters.includes(dt));
  });

  save();
  if(state.currentTab==='plan') renderPlan();
}

// Initialize
function init(){
  // Find current week
  let curWeekIdx = 0;
  weeks.forEach((w,i) => {
    if(w.some(day=>isToday(day.y,day.m,day.d))) curWeekIdx = i;
  });
  if(state.currentWeek===0 && curWeekIdx>0) state.currentWeek = curWeekIdx;

  renderWeekTabs();

  if(state.currentTab==='plan') renderPlan();
  else if(state.currentTab==='stats') renderStats();
  else if(state.currentTab==='review') renderReview();

  // Restore filter chip visuals
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('on', state.filters.includes(chip.dataset.track));
  });

  // Highlight correct nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===state.currentTab));

  updateProgress();
}

init();
</script>
